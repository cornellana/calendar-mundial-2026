name: Actualizar datos del Mundial

# Cron cada 30 minutos. Cuando termina un partido, en ~30 min la app
# ya descarga los datos completos sin intervención humana.
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Forzar reproceso de todos los partidos finalizados (útil tras corregir bugs del script)'
        type: boolean
        default: false

# Permiso de escritura para commitear los cambios al repo
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependencias
        run: pip install --quiet requests

      - name: Actualizar JSON desde ESPN
        env:
          FORCE_REFRESH: ${{ github.event.inputs.force_refresh }}
        run: python scripts/update_mundial.py

      - name: Commit + push si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/mundial2026.json
          if git diff --cached --quiet; then
            echo "Sin cambios."
          else
            git commit -m "chore: actualización automática del Mundial $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          fi
